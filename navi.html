<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>호텔호텔</title>
        <style>
            .container{
                width:960px;
                 margin:0 auto;
                }
            .navi{
                width:960px;
                height:60px;
                padding-bottom: 10px;
                border-bottom: 2px solid #ccc;
            }
            .navi ul{
                list-style: none; 
                padding-top: 10px;
                padding-bottom: 5px;
            }
            .navi ul li{
                float:left;
                width:150px;
                padding:10px;
            }
            .navi a:link,
            .navi a:visited{
                display:block;
                font-size: 14px;
                color:#000;
                padding:10px;
                text-decoration: none;
                text-align: center;
            }
            .navi a:hover,
            .navi a:focus{
                background-color: #222;
                color:#fff;
            }
            .navi a:active{
                background-color: #338485;
            }
            .contents{
                margin:30px auto;
                width:400px;
                padding:20px;
                border:1px solid #222;
                border-radius:5px;
            }
            #intro:target{
                background-color: #0350a8;
                color:#fff;
            }
            #room:target{
                background-color: #ff9844;
                color:#fff;
            }
            #reservation:target{
                background-color: #ffcc00;
                color:#fff;
            }
           
        </style>
    </head>
    <body>
        
        <div class="container">
            <nav class="navi">
                <ul>
                    <li><a href="#intro">이용안내</a></li>
                    <li><a href="#room">객실 소개</a> </li>
                    <li><a href="#reservation">예약 방법 및 요금</a> </li>
                    <li><a href="ps-2.html">예약하기</a></li>
                </ul>
            </nav>
        </div>
        <div id="intro" class="contents"><h2>이용 안내</h2>
        <p>
          잘
        </p>
        </div>
        <div id="room" class="contents">
        <h2>객실 소개</h2>
        <p>짱</p>
        </div>
        <div id="reservation" class="contents">
        <h2>예약 방법 및 요금</h2>
        <p>
        비쌈
        </p>
        </div>
    </body>
</html>
